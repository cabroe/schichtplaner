version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - ENV=prod
      - DATABASE_URL=postgres://schichtplaner:password@db:5432/schichtplaner?sslmode=disable
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=schichtplaner
      - POSTGRES_USER=schichtplaner
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data: