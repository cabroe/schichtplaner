services:
  schichtplaner-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - SERVER_PORT=3000
      - ENV=dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/frontend/node_modules
    restart: unless-stopped
    depends_on:
      - frontend-dev

  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: yarn dev --host 0.0.0.0
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
      - VITE_APP_TITLE=Schichtplaner (Docker Dev)
    restart: unless-stopped
