basePath: /
definitions:
  handlers.HealthResponse:
    properties:
      database:
        type: string
      status:
        type: string
      timestamp:
        type: string
    type: object
  models.APIResponse:
    properties:
      data: {}
      error:
        example: Fehlermeldung
        type: string
      message:
        example: Operation erfolgreich
        type: string
      success:
        example: true
        type: boolean
    type: object
  models.Department:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.ShiftDay:
    properties:
      date:
        type: string
      id:
        type: integer
      shift_type_id:
        type: integer
      shift_week_id:
        type: integer
      user_id:
        type: integer
    type: object
  models.ShiftType:
    properties:
      description:
        type: string
      duration:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  models.ShiftWeek:
    properties:
      department_id:
        type: integer
      end_date:
        type: string
      id:
        type: integer
      start_date:
        type: string
    type: object
  models.User:
    properties:
      color:
        type: string
      department_id:
        type: integer
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_admin:
        type: boolean
      last_name:
        type: string
      password:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Carsten Bröckert
  description: Golang backend API using Fiber and SQLite
  license:
    name: MIT
  title: Schichtplaner
  version: "0.1"
paths:
  /departments:
    get:
      consumes:
      - application/json
      description: Fetch all departments
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Get all departments
      tags:
      - departments
    post:
      consumes:
      - application/json
      description: Create a new department
      parameters:
      - description: Department information
        in: body
        name: department
        required: true
        schema:
          $ref: '#/definitions/models.Department'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Create a department
      tags:
      - departments
  /departments/{id}:
    delete:
      consumes:
      - application/json
      description: Delete department by ID
      parameters:
      - description: Department ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Delete a department
      tags:
      - departments
    get:
      consumes:
      - application/json
      description: Get department details by ID
      parameters:
      - description: Department ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Get a single department
      tags:
      - departments
    put:
      consumes:
      - application/json
      description: Update department information by ID
      parameters:
      - description: Department ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated department information
        in: body
        name: department
        required: true
        schema:
          $ref: '#/definitions/models.Department'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Update a department
      tags:
      - departments
  /health:
    get:
      consumes:
      - '*/*'
      description: get the status of server and its components.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
      summary: Show the status of server.
      tags:
      - health
