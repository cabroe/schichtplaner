basePath: /
definitions:
  handlers.HealthData:
    properties:
      api_path:
        type: string
      database:
        type: string
      environment:
        type: string
      go_version:
        type: string
      goroutines:
        type: integer
      mem_stats:
        $ref: '#/definitions/handlers.SimpleMemStats'
      num_cpu:
        type: integer
      status:
        type: string
      timestamp:
        type: string
      version:
        type: string
    type: object
  handlers.SimpleMemStats:
    properties:
      alloc:
        type: integer
      num_gc:
        type: integer
      sys:
        type: integer
      total_alloc:
        type: integer
    type: object
  models.Department:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      shift_weeks:
        items:
          $ref: '#/definitions/models.ShiftWeek'
        type: array
      updated_at:
        type: string
      users:
        items:
          $ref: '#/definitions/models.User'
        type: array
    type: object
  models.ShiftDay:
    properties:
      created_at:
        type: string
      date:
        type: string
      id:
        type: integer
      shift_type_id:
        type: integer
      shift_week_id:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  models.ShiftType:
    properties:
      color:
        type: string
      created_at:
        type: string
      description:
        type: string
      duration:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.ShiftWeek:
    properties:
      created_at:
        type: string
      department_id:
        type: integer
      end_date:
        type: string
      id:
        type: integer
      start_date:
        type: string
      updated_at:
        type: string
    type: object
  models.User:
    properties:
      color:
        type: string
      created_at:
        type: string
      department_id:
        type: integer
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_admin:
        type: boolean
      last_name:
        type: string
      password:
        type: string
      updated_at:
        type: string
    type: object
  responses.APIResponse:
    properties:
      data: {}
      error:
        example: Ein Fehler ist aufgetreten
        type: string
      message:
        example: Operation erfolgreich durchgeführt
        type: string
      success:
        example: true
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    name: Carsten Bröckert
  description: Schichtplanung mit Go, Fiber und SQLite
  license:
    name: MIT
  title: Schichtplaner
  version: "1.0"
paths:
  /api/v1/departments:
    get:
      consumes:
      - application/json
      description: Ruft alle Abteilungen mit zugehörigen Benutzern und Schichtwochen
        ab
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Department'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Alle Abteilungen abrufen
      tags:
      - departments
    post:
      consumes:
      - application/json
      description: Erstellt eine neue Abteilung mit den angegebenen Daten
      parameters:
      - description: Abteilungsdaten
        in: body
        name: department
        required: true
        schema:
          $ref: '#/definitions/models.Department'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Department'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Neue Abteilung erstellen
      tags:
      - departments
  /api/v1/departments/{id}:
    delete:
      consumes:
      - application/json
      description: Löscht eine Abteilung und ihre Beziehungen
      parameters:
      - description: Abteilungs-ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Abteilung löschen
      tags:
      - departments
    get:
      consumes:
      - application/json
      description: Ruft eine spezifische Abteilung mit allen Details ab
      parameters:
      - description: Abteilungs-ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Department'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Einzelne Abteilung abrufen
      tags:
      - departments
    put:
      consumes:
      - application/json
      description: Aktualisiert eine bestehende Abteilung
      parameters:
      - description: Abteilungs-ID
        in: path
        name: id
        required: true
        type: integer
      - description: Aktualisierte Abteilungsdaten
        in: body
        name: department
        required: true
        schema:
          $ref: '#/definitions/models.Department'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Department'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Abteilung aktualisieren
      tags:
      - departments
  /api/v1/health:
    get:
      consumes:
      - '*/*'
      description: Gibt detaillierte Informationen über den Systemzustand zurück
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/handlers.HealthData'
              type: object
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Systemstatus abrufen
      tags:
      - health
