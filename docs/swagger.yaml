basePath: /
definitions:
  handlers.CreateAbsenceDTO:
    properties:
      description:
        type: string
      end_date:
        type: string
      start_date:
        type: string
      status:
        type: string
      type:
        type: string
      user_id:
        type: integer
    type: object
  handlers.CreateDepartmentDTO:
    properties:
      name:
        type: string
    type: object
  handlers.CreateShiftDayDTO:
    properties:
      date:
        type: string
      shift_type_id:
        type: integer
      shift_week_id:
        type: integer
      user_id:
        type: integer
    type: object
  handlers.CreateShiftTypeDTO:
    properties:
      description:
        type: string
      duration:
        type: string
      name:
        type: string
    type: object
  handlers.CreateShiftWeekDTO:
    properties:
      department_id:
        type: integer
      end_date:
        type: string
      start_date:
        type: string
    type: object
  handlers.CreateUserDTO:
    properties:
      department_id:
        type: integer
      email:
        type: string
      name:
        type: string
    type: object
  models.APIResponse:
    properties:
      data: {}
      error:
        example: Fehlermeldung
        type: string
      message:
        example: Operation erfolgreich
        type: string
      success:
        example: true
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    name: Carsten Bröckert
  description: Golang backend API using Fiber and SQLite
  license:
    name: MIT
  title: Schichtplaner
  version: "0.1"
paths:
  /absences:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Get all absences
      tags:
      - absences
    post:
      consumes:
      - application/json
      parameters:
      - description: Absence Data
        in: body
        name: absence
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAbsenceDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Create absence
      tags:
      - absences
  /departments:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Get all departments
      tags:
      - departments
    post:
      consumes:
      - application/json
      parameters:
      - description: Department Data
        in: body
        name: department
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateDepartmentDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Create department
      tags:
      - departments
  /health:
    get:
      consumes:
      - '*/*'
      description: get the status of server.
      produces:
      - text/plain
      responses:
        "200":
          description: OK
      summary: Show the status of server.
      tags:
      - health
  /shiftdays:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Get all shift days
      tags:
      - shiftdays
    post:
      consumes:
      - application/json
      parameters:
      - description: ShiftDay Data
        in: body
        name: shiftday
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateShiftDayDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Create shift day
      tags:
      - shiftdays
  /shifttypes:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Get all shift types
      tags:
      - shifttypes
    post:
      consumes:
      - application/json
      parameters:
      - description: ShiftType Data
        in: body
        name: shifttype
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateShiftTypeDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Create shift type
      tags:
      - shifttypes
  /shiftweeks:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Get all shift weeks
      tags:
      - shiftweeks
    post:
      consumes:
      - application/json
      parameters:
      - description: ShiftWeek Data
        in: body
        name: shiftweek
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateShiftWeekDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Create shift week
      tags:
      - shiftweeks
  /users:
    get:
      consumes:
      - application/json
      description: Fetch all users with their departments
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Get all users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Create a new user with department assignment
      parameters:
      - description: User information
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateUserDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Create a new user
      tags:
      - users
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: Delete user by ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Delete a user
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Get user details by ID including department
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Get a single user
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update user information by ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated user information
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateUserDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Update a user
      tags:
      - users
swagger: "2.0"
