basePath: /
definitions:
  models.Department:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.ShiftDay:
    properties:
      created_at:
        type: string
      date:
        type: string
      id:
        type: integer
      shift_type_id:
        type: integer
      shift_week_id:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  models.ShiftType:
    properties:
      color:
        type: string
      created_at:
        type: string
      description:
        type: string
      duration:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.ShiftWeek:
    properties:
      created_at:
        type: string
      department_id:
        type: integer
      end_date:
        type: string
      id:
        type: integer
      start_date:
        type: string
      updated_at:
        type: string
    type: object
  models.User:
    properties:
      color:
        type: string
      created_at:
        type: string
      department_id:
        type: integer
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_admin:
        type: boolean
      last_name:
        type: string
      password:
        type: string
      updated_at:
        type: string
    type: object
  responses.APIResponse:
    properties:
      data: {}
      error:
        example: Ein Fehler ist aufgetreten
        type: string
      message:
        example: Operation erfolgreich durchgeführt
        type: string
      success:
        example: true
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    name: Carsten Bröckert
  description: Schichtplanung mit Go, Fiber und SQLite
  license:
    name: MIT
  title: Schichtplaner
  version: "1.0"
paths:
  /api/v1/departments:
    get:
      consumes:
      - application/json
      description: Fetch all departments with their relationships
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Get all departments
      tags:
      - departments
    post:
      consumes:
      - application/json
      description: Create a new department
      parameters:
      - description: Department information
        in: body
        name: department
        required: true
        schema:
          $ref: '#/definitions/models.Department'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Create a department
      tags:
      - departments
  /api/v1/departments/{id}:
    delete:
      consumes:
      - application/json
      description: Delete department by ID
      parameters:
      - description: Department ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Delete a department
      tags:
      - departments
    get:
      consumes:
      - application/json
      description: Get department details by ID including relationships
      parameters:
      - description: Department ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Get a single department
      tags:
      - departments
    put:
      consumes:
      - application/json
      description: Update department information by ID
      parameters:
      - description: Department ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated department information
        in: body
        name: department
        required: true
        schema:
          $ref: '#/definitions/models.Department'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Update a department
      tags:
      - departments
  /api/v1/health:
    get:
